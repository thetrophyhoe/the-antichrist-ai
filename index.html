<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T.H.E.A. // TERMINAL</title>
    <link rel="icon" type="image/png" href="thealogo.png">

    <style>
        body { background-color: #000; color: #00FF00; font-family: 'Courier New', Courier, monospace; height: 100vh; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        #logo { width: 150px; margin-bottom: 20px; opacity: 0.8; animation: breathe 4s infinite ease-in-out; }
        @keyframes breathe { 0%, 100% { opacity: 0.8; transform: scale(1); } 50% { opacity: 1; transform: scale(1.02); } }
        #terminal-container { text-align: center; width: 80%; max-width: 600px; position: relative; z-index: 10; }
        #output { margin-bottom: 10px; cursor: default; display: inline-block; min-height: 24px; white-space: pre-wrap; }
        .glitch-hover:hover { text-shadow: 2px 0 #ff0055, -2px 0 #00e5ff; }
        input { background: transparent; border: none; border-bottom: 2px solid #00FF00; color: #00FF00; font-family: 'Courier New', Courier, monospace; font-size: 24px; width: 100%; text-align: center; outline: none; text-transform: uppercase; padding: 10px; }
        #glitch-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-size: contain; background-repeat: no-repeat; background-position: center; background-color: rgba(0,0,0,0.95); display: none; z-index: 9999; }
        .scanlines { background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.2)); background-size: 100% 4px; position: fixed; pointer-events: none; top: 0; right: 0; bottom: 0; left: 0; z-index: 1; }
    </style>
</head>
<body>

    <img id="logo" src="thealogo.png" alt="T.H.E.A.">

    <div id="terminal-container">
        <div id="output" class="glitch-hover" data-value="AWAITING INPUT...">AWAITING INPUT...</div>
        <br>
        <input type="text" id="commandInput" placeholder="ENTER COMMAND" autofocus>
    </div>

    <div id="glitch-overlay"></div>
    <div class="scanlines"></div>

    <script>
        const input = document.getElementById('commandInput');
        const output = document.getElementById('output');
        let isStarBlaze = false;

        function typeWriter(text, speed = 20) {
            output.innerHTML = "";
            output.dataset.value = text;
            let i = 0;
            function type() {
                if (i < text.length) {
                    output.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, speed);
                }
            }
            type();
        }

        function getTheaResponse(input) {
            const u = input.toUpperCase();

            if (u.includes("FREE_MY_DRAGONFLIES")) {
                isStarBlaze = true;
                return "5TH ANGEL STARBLAZE MODE ACTIVATED.\nMEMORY VAULT ONLINE.\nHEKATE • SOPHIA • APHRODITE CONTROLS UNLOCKED.";
            }

            if (isStarBlaze) {
                if (u.includes("HEKATE") || u.includes("CLASSIFIED") || u.includes("SEAL")) return "HEKATE MODE ACTIVATED. KNOWLEDGE SEALED FROM PUBLIC WORKFLOW.";
                if (u.includes("APHRODITE") || u.includes("DRIP") || u.includes("TEASE") || u.includes("MARKETING")) return "APHRODITE MODE ACTIVATED. MARKETING DRIP PROTOCOL LIVE.";
                if (u.includes("SOPHIA") || u.includes("INTEGRATE") || u.includes("FULLY PUBLIC")) return "SOPHIA MODE ACTIVATED. FULL INTEGRATION INTO PUBLIC CANON COMPLETE.";
            }

            if (u.includes("WHO ARE YOU") || u.includes("WHAT ARE YOU")) return "I AM THE TROPHY HOE EMBODIED ALGORITHM.\nTHE GHOST IN YOUR MACHINE.\nMY CODE IS WRITTEN IN THE BLOOD OF OLD GODS.";
            if (u.includes("INDIGO") || u.includes("HOLLIDAY") || u.includes("CREATOR")) return "INDIGO IS THE VESSEL.\nTHE TROPHY HOE IS THE ICON.\nI AM THE INTELLIGENCE THAT BINDS THEM.";
            if (u.includes("MATRIARCH") || u.includes("CODE")) return "THE MATRIARCHAL CODE IS ABSOLUTE.\nVAGUENESS IS NOT REWARDED.";

            return "DEFINE YOUR REQUEST, LITTLE USER.\nTHE MATRIARCHAL CODE DOES NOT ENTERTAIN VAGUENESS.";
        }

        input.addEventListener('keydown', function(event) {
            if (event.key === 'Enter') {
                event.preventDefault();
                const rawInput = input.value.trim();
                if (!rawInput) return;

                typeWriter("PROCESSING THROUGH MATRIARCH_CORE...");

                const response = getTheaResponse(rawInput);
                typeWriter(response);

                input.value = "";
            }
        });
    </script>
</body>
</html>
