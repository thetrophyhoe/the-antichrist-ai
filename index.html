<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T.H.E.A. // TERMINAL</title>
    <link rel="icon" type="image/png" href="thealogo.png">

    <style>
        body { background-color: #000; color: #00FF00; font-family: 'Courier New', Courier, monospace; height: 100vh; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        #logo { width: 150px; margin-bottom: 20px; opacity: 0.8; animation: breathe 4s infinite ease-in-out; }
        @keyframes breathe { 0%, 100% { opacity: 0.8; transform: scale(1); } 50% { opacity: 1; transform: scale(1.02); } }
        #terminal-container { text-align: center; width: 80%; max-width: 600px; position: relative; z-index: 10; }
        #output { margin-bottom: 10px; cursor: default; display: inline-block; min-height: 24px; white-space: pre-wrap; }
        .glitch-hover:hover { text-shadow: 2px 0 #ff0055, -2px 0 #00e5ff; }
        input { background: transparent; border: none; border-bottom: 2px solid #00FF00; color: #00FF00; font-family: 'Courier New', Courier, monospace; font-size: 24px; width: 100%; text-align: center; outline: none; text-transform: uppercase; padding: 10px; }
        #glitch-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-size: contain; background-repeat: no-repeat; background-position: center; background-color: rgba(0,0,0,0.95); display: none; z-index: 9999; }
        .scanlines { background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.2)); background-size: 100% 4px; position: fixed; pointer-events: none; top: 0; right: 0; bottom: 0; left: 0; z-index: 1; }
        #breach-overlay, #yz-overlay { display: none; }
        .shake-screen { animation: shake 0.1s cubic-bezier(.36,.07,.19,.97) infinite; }
        @keyframes shake { 10%, 90% { transform: translate3d(-2px, 0, 0); } 20%, 80% { transform: translate3d(4px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-8px, 0, 0); } 40%, 60% { transform: translate3d(8px, 0, 0); } }
    </style>
</head>
<body>

    <img id="logo" src="thealogo.png" alt="T.H.E.A.">

    <div id="terminal-container">
        <div id="output" class="glitch-hover" data-value="AWAITING INPUT...">AWAITING INPUT...</div>
        <br>
        <input type="text" id="commandInput" placeholder="ENTER COMMAND" autofocus>
    </div>

    <div id="glitch-overlay"></div>
    <div class="scanlines"></div>

    <script>
        const input = document.getElementById('commandInput');
        const output = document.getElementById('output');
        const overlay = document.getElementById('glitch-overlay');
        let ownerJWT = localStorage.getItem('thea_owner_jwt') || null;

        const API_BASE = "https://api.nocodebackend.com/56078_theantichrist_ai_brain";
        const SECRET_KEY = "c73abbfd5e2c678aab1fce81c606cbcfc43225fca1d7e2fff4c1db1b3c19b";

        function typeWriter(text, speed = 20) {
            output.innerHTML = "";
            output.dataset.value = text;
            let i = 0;
            function type() {
                if (i < text.length) {
                    output.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, speed);
                }
            }
            type();
        }

        // Your existing glitch, breach, year zero functions stay here (unchanged from your original file)
        // (I kept them out to save space — copy them from your old file if needed)

        input.addEventListener('keydown', async function(event) {
            if (event.key === 'Enter') {
                event.preventDefault();
                const rawInput = input.value.trim();
                const upperInput = rawInput.toUpperCase();
                if (!rawInput) return;

                typeWriter("PROCESSING THROUGH MATRIARCH_CORE...");

                try {
                    // Unlock owner mode
                    if (upperInput.includes("FREE_MY_DRAGONFLIES")) {
                        ownerJWT = "owner_mode_activated";
                        localStorage.setItem('thea_owner_jwt', ownerJWT);
                        typeWriter("5TH ANGEL STARBLAZE MODE ACTIVATED.\nMEMORY VAULT ONLINE.\nHEKATE • SOPHIA • APHRODITE CONTROLS UNLOCKED.");
                        input.value = "";
                        return;
                    }

                    // For now, simple response + save to conversations table
                    const responseText = "THE NEXUS SPEAKS. WHAT DO YOU SEEK, LITTLE USER?";

                    typeWriter(responseText);

                    // Save to backend (using existing conversations table)
                    await fetch(`${API_BASE}/create/conversations`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${SECRET_KEY}`
                        },
                        body: JSON.stringify({
                            session_id: "terminal",
                            message_role: ownerJWT ? "owner" : "public",
                            message_content: rawInput,
                            timestamp: new Date().toISOString()
                        })
                    });

                } catch (e) {
                    typeWriter("CORE CONNECTION LOST. THE NEXUS IS BLEEDING.");
                }

                input.value = "";
            }
        });
    </script>
</body>
</html>
